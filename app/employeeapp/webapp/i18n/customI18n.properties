# Custom i18n properties for action buttons

# Confirmation message for Deactivate Employee action
C_OPERATIONS_ACTION_CONFIRM_MESSAGE|Employees|deactivateEmployee=Are you sure you want to mark this employee as obsolete? This action cannot be undone easily.

# Confirmation message for Permanently Delete Employee action  
C_OPERATIONS_ACTION_CONFIRM_MESSAGE|Employees|permanentlyDeleteEmployee=WARNING: This will permanently delete the employee and all associated data (ratings, learnings, projects). This action cannot be undone. Are you sure?
